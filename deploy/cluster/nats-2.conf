# Cluster node 2 of the 3-node bus-nats deployment. See nats-1.conf for a
# walkthrough of the shared options.

server_name: bus-nats-2

host: 0.0.0.0
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  domain:    "bus"

  max_memory_store: -1
  max_file_store:   -1
}

cluster {
  name: bus-cluster
  host: 0.0.0.0
  port: 6222
  routes = [
    nats-route://nats-1:6222
    nats-route://nats-3:6222
  ]
}

logtime: true
