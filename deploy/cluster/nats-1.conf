# Cluster node 1 of the 3-node bus-nats deployment.
#
# Each node has the same JetStream domain so that streams replicate across
# them. The bus.Client connects to any (or all) of the published client
# ports — the cluster routes traffic internally.

server_name: bus-nats-1

host: 0.0.0.0
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  domain:    "bus"

  max_memory_store: -1
  max_file_store:   -1
}

cluster {
  name: bus-cluster
  host: 0.0.0.0
  port: 6222
  routes = [
    nats-route://nats-2:6222
    nats-route://nats-3:6222
  ]
}

logtime: true
