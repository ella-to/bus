# Single-node NATS server config used by deploy/docker-compose.yml.
#
# This is a sensible default for local development and small production
# deployments. For multi-node HA see deploy/docker-compose.cluster.yml and
# the per-node configs under deploy/cluster/.

server_name: bus-nats

# Client connections.
host: 0.0.0.0
port: 4222

# HTTP monitoring endpoint (varz, jsz, connz, etc.). Disable in production
# behind an untrusted network or put it on a private interface only.
http_port: 8222

# JetStream is what powers the persistent "ella.to/bus" engine — every
# bus.Client.Put on a non-inbox subject hits a JetStream stream named
# BUS_<namespace>.
jetstream {
  # Where streams and consumers are persisted. The compose file mounts a
  # volume here so data survives container restarts.
  store_dir: "/data/jetstream"

  # Optional resource caps. -1 = unlimited (rely on OS / volume size).
  max_memory_store: -1
  max_file_store:   -1

  # Domain is useful when running multiple JetStream "regions" that
  # federate. Leave commented out for the simple single-node case.
  # domain: "bus"
}

# Reasonable connection / write deadlines.
max_connections: 64K
write_deadline:  "10s"

# Slow consumer protection. The default is permissive; tighten as needed.
max_pending: 64MB

# Logging.
logtime: true
debug:   false
trace:   false
